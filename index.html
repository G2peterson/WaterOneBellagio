<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water One Bellagio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-container">
    <div class="scene">
      <img id="sceneImage" src="scene1.png" alt="Current scene" />
    </div>

    <div class="ui">
      <div id="speakerText" class="speaker"></div>
      <div id="questionText" class="question"></div>
      <div id="feedbackText" class="feedback"></div>

      <div id="answers" class="answers">
        <button id="answer1"></button>
        <button id="answer2"></button>
        <button id="answer3"></button>
      </div>

      <div id="meterArea" class="meter-area hidden">
        <div id="meterLabel" class="meter-label"></div>
        <div id="meter">
          <div id="targetZone"></div>
          <div id="needle"></div>
        </div>
        <button id="lockBtn">Lock In</button>
      </div>

      <div class="controls">
        <button id="continueBtn" disabled>Continue</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
  </div>

  <script src="script.js"></script>
</body>
</html>
