<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water 1 Bellagio</title>
</head>
<body>
  <div class="game-container">

    <div class="scene">
      <img id="sceneImage" src="scene1.jpg" alt="Current scene" />
    </div>

    <div class="ui">
      <div class="dialogue" id="dialogue"></div>

      <div class="choices" id="choices"></div>

      <div class="meter-area" id="meterArea">
        <div id="meter">
          <div id="targetZone"></div>
          <div id="needle"></div>
        </div>
        <button id="actionBtn">Lock In</button>
      </div>

      <div class="controls" id="controls">
        <button id="continueBtn">Continue</button>
      </div>
    </div>

  </div>
</body>
</html>
